<div class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-logo">
      <span class="paw">🐾</span>
      <h1>PawMatch</h1>
      <p class="tagline">{{ 'auth.loginSubtitle' | translate }}</p>
    </div>
    <form (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label for="username">{{ 'auth.username' | translate }}</label>
        <div class="input-wrapper">
          <span class="input-icon">🐱</span>
          <input
            id="username"
            type="text"
            [(ngModel)]="username"
            name="username"
            placeholder="username"
            required
            autocomplete="username"
          />
        </div>
      </div>

      <div class="form-group">
        <label for="password">{{ 'auth.password' | translate }}</label>
        <div class="input-wrapper">
          <span class="input-icon">🔑</span>
          <input
            id="password"
            type="password"
            [(ngModel)]="password"
            name="password"
            placeholder="••••••••"
            required
            autocomplete="current-password"
          />
        </div>
      </div>

      <div *ngIf="errorMsg" class="error-banner">{{ errorMsg }}</div>

      <button type="submit" class="btn-primary" [disabled]="isLoading">
        <ng-container *ngIf="isLoading; else notLoading">
          <span class="spinner"></span> {{ 'auth.submitLogin' | translate }}...
        </ng-container>
      </button>
      <ng-template #notLoading>
        {{ 'auth.submitLogin' | translate }} 🐾
      </ng-template>
    </form>

    <p class="auth-link">
      {{ 'auth.noAccount' | translate }} <a routerLink="/register">{{ 'auth.submitRegister' | translate }}</a>
    </p>
  </div>
</div>
